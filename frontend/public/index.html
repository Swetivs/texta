<!doctype html>
<html lang="ro" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analiză Frecvență Cuvinte</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Integrare Fonturi Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Adăugăm FontAwesome pentru iconițe (fără emoji) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Buton Switcher Day/Night poziționat absolut dreapta-sus -->
    <button id="themeToggleBtn" class="btn btn-outline-success position-absolute top-0 end-0 m-3 d-flex align-items-center justify-content-center theme-btn">
      <i id="themeIcon" class="fas fa-sun fa-lg"></i>
    </button>

    <div class="container mt-5 pt-4">
      <div class="row justify-content-center">
        <div class="col-md-8 text-center">
          <h1 class="mb-4">Căutare de frecvență a cuvintelor</h1>
          <p class="lead">
            Încarcă un fișier text pentru a analiza frecvența cuvintelor.
            Rezultatul va fi afișat sub formă de histogramă.
          </p>

          <div class="card p-4 shadow-sm">
            <form id="uploadForm">
              <div class="mb-3">
                <label for="textInput" class="form-label"
                  >Introdu textul manual:</label
                >
                <textarea
                  class="form-control"
                  id="textInput"
                  rows="5"
                  placeholder="Scrie textul tău aici..."
                ></textarea>
              </div>
              <div class="text-center mb-3"><strong>SAU</strong></div>
              <div class="mb-4">
                <label for="fileInput" class="form-label"
                  >Încarcă un fișier (.txt):</label
                >
                <input
                  class="form-control"
                  type="file"
                  id="fileInput"
                  accept=".txt"
                />
              </div>
              <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm">
                Analizează Textul
              </button>
            </form>
          </div>
        </div>
      </div>

      <div id="resultsSection" class="row mt-5" style="display: none">
        <div class="col-12">
          
          <!-- Statistici Noi -->
          <div class="card shadow-sm p-3 mb-4 bg-success text-white rounded d-flex flex-row justify-content-between align-items-center">
            <h5 class="mb-0">Total cuvinte: <span id="totalWordsCount" class="fw-bold">0</span></h5>
            <span class="fs-6">Timp procesare: <span id="timeTakenText" class="fw-bold">0</span> ms</span>
          </div>

          <div class="card shadow-sm p-4">
            <h3 class="mb-3">Histogramă Frecvențe</h3>
            <div id="histogramContainer" class="histogram-container"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Chart.js pentru posibile grafice avansate, optional -->
    <script src="script.js"></script>
  </body>
</html>
