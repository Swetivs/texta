<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analiză Frecvență Cuvinte</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8 text-center">
          <h1 class="mb-4">Căutare de frecvență a cuvintelor</h1>
          <p class="lead">
            Încarcă un fișier text pentru a analiza frecvența cuvintelor.
            Rezultatul va fi afișat sub formă de histogramă.
          </p>

          <div class="card p-4 shadow-sm">
            <form id="uploadForm">
              <div class="mb-3">
                <label for="textInput" class="form-label"
                  >Introdu textul manual:</label
                >
                <textarea
                  class="form-control"
                  id="textInput"
                  rows="5"
                  placeholder="Scrie textul tău aici..."
                ></textarea>
              </div>
              <div class="text-center mb-3"><strong>SAU</strong></div>
              <div class="mb-4">
                <label for="fileInput" class="form-label"
                  >Încarcă un fișier (.txt):</label
                >
                <input
                  class="form-control"
                  type="file"
                  id="fileInput"
                  accept=".txt"
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Analizează Textul
              </button>
            </form>
          </div>
        </div>
      </div>

      <div id="resultsSection" class="row mt-5" style="display: none">
        <div class="col-12">
          
          <!-- Statistici Noi -->
          <div class="card shadow-sm p-3 mb-4 bg-info text-white rounded d-flex flex-row justify-content-between align-items-center">
            <h5 class="mb-0">Total cuvinte: <span id="totalWordsCount" class="fw-bold">0</span></h5>
            <span class="fs-6">Timp procesare: <span id="timeTakenText" class="fw-bold">0</span> ms</span>
          </div>

          <div class="card shadow-sm p-4">
            <h3 class="mb-3">Histogramă Frecvențe</h3>
            <div id="histogramContainer" class="histogram-container"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Chart.js pentru posibile grafice avansate, optional -->
    <script src="script.js"></script>
  </body>
</html>
